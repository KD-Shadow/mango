# reload config
bind=SUPER+SHIFT,r,reload_config

# menu and terminal
bind=SUPER,Return,spawn,ghostty
bind=SUPER,space,spawn,dms ipc call spotlight toggle
bind=SUPER,v,spawn,dms ipc call clipboard toggle
bind=SUPER,m,spawn,dms ipc call processlist focusOrToggle
bind=SUPER,comma,spawn,dms ipc call settings focusOrToggle
bind=SUPER+SHIFT,n,spawn,dms ipc call notifications toggle
bind=SUPER+ALT,w,spawn,dms ipc wallpaperCarousel toggle
bind=SUPER,f,spawn,ghostty -e yazi
bind=SUPER,s,spawn,dms ipc control-center toggle
bind=SUPER+ALT,n,spawn,neovide
bind=SUPER+ALT,t,spawn,dms ipc tmux open

# kill window
bind=SUPER,q,killclient

# browser
bind=SUPER,b,spawn,brave
bind=SUPER+SHIFT,e,spawn,pcmanfm
bind=SUPER,p,spawn_shell,~/.config/scripts/projects.py
bind=SUPER+SHIFT,s,spawn_shell,~/.config/scripts/commands.lua
bind=SUPER+SHIFT,b,spawn_shell,~/.config/scripts/bookmarks-rofi.py
bind=SUPER+SHIFT,o,spawn_shell,~/.config/scripts/file_opener.sh
bind=SUPER+SHIFT,t,spawn_shell,~/.config/scripts/theme-switcher.sh

# power controls
bind=SUPER+ALT+CTRL,P,spawn_shell,systemctl poweroff
bind=SUPER+ALT+CTRL,R,spawn_shell,systemctl reboot

# window focus
bind=SUPER,Tab,focusstack,next
bind=SUPER,u,focuslast

bind=ALT,Left,focusdir,left
bind=ALT,Right,focusdir,right
bind=ALT,Up,focusdir,up
bind=ALT,Down,focusdir,down

# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# move window
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0

# resize window
bind=CTRL+ALT,k,resizewin,+0,-50
bind=CTRL+ALT,j,resizewin,+0,+50
bind=CTRL+ALT,h,resizewin,-50,+0
bind=CTRL+ALT,l,resizewin,+50,+0

# window states
bind=SUPER,g,toggleglobal
bind=ALT,Tab,toggleoverview
bind=ALT,a,togglefloating
bind=ALT,\,togglemaximizescreen
bind=ALT,f,togglefullscreen
bind=ALT+SHIFT,f,togglefakefullscreen

bind=SUPER,i,minimized
bind=SUPER+SHIFT,i,restore_minimized

bind=SUPER,o,toggleoverlay
bind=ALT,z,toggle_scratchpad

# scroller layout
bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset

# tile layout
bind=SUPER,e,incnmaster,1
bind=SUPER,t,incnmaster,-1
bind=ALT,s,zoom

# layout switch
bind=CTRL+SUPER,i,setlayout,tile
bind=CTRL+SUPER,l,setlayout,scroller
bind=SUPER,n,switch_layout

# workspace navigation
bind=SUPER,Left,viewtoleft,0
bind=SUPER,Right,viewtoright,0

bind=CTRL,Left,viewtoleft_have_client,0
bind=CTRL,Right,viewtoright_have_client,0

# move window to workspace
bind=CTRL+SUPER,Left,tagtoleft,0
bind=CTRL+SUPER,Right,tagtoright,0

# direct workspace
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# toggle tag
bind=CTRL+SUPER,1,toggletag,1
bind=CTRL+SUPER,2,toggletag,2
bind=CTRL+SUPER,3,toggletag,3
bind=CTRL+SUPER,4,toggletag,4
bind=CTRL+SUPER,5,toggletag,5
bind=CTRL+SUPER,6,toggletag,6
bind=CTRL+SUPER,7,toggletag,7
bind=CTRL+SUPER,8,toggletag,8
bind=CTRL+SUPER,9,toggletag,9

# monitor focus
bind=SUPER+SHIFT,Left,focusmon,left
bind=SUPER+SHIFT,Right,focusmon,right
bind=SUPER+SHIFT,Up,focusmon,up
bind=SUPER+SHIFT,Down,focusmon,down

# send window to monitor
bind=SUPER+ALT,Left,tagmon,left
bind=SUPER+ALT,Right,tagmon,right
bind=SUPER+ALT,Up,tagmon,up
bind=SUPER+ALT,Down,tagmon,down

# gaps
bind=ALT+SHIFT,x,incgaps,1
bind=ALT+SHIFT,z,incgaps,-1
bind=ALT+SHIFT,r,togglegaps

# mouse bindings
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

mousebind=ALT,btn_middle,set_proportion,0.5

mousebind=SUPER+CTRL,btn_left,minimized
mousebind=SUPER+CTRL,btn_right,killclient
mousebind=SUPER+CTRL,btn_middle,togglefullscreen

# mousebind=NONE,btn_middle,togglemaximizescreen,0

# scroll bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

axisbind=ALT,UP,focusdir,left
axisbind=ALT,DOWN,focusdir,right

axisbind=SHIFT+SUPER,UP,exchange_client,left
axisbind=SHIFT+SUPER,DOWN,exchange_client,right

# gestures
gesturebind=none,left,3,focusdir,left
gesturebind=none,right,3,focusdir,right
gesturebind=none,up,3,focusdir,up
gesturebind=none,down,3,focusdir,down

gesturebind=none,left,4,viewtoleft_have_client
gesturebind=none,right,4,viewtoright_have_client

gesturebind=none,up,4,toggleoverview,1
gesturebind=none,down,4,toggleoverview,1

# brightness + volume
bind=CTRL,comma,spawn,dms ipc call brightness decrement 2 ""
bind=CTRL,period,spawn,dms ipc call brightness increment 2 ""

bind=ALT,comma,spawn,dms ipc call audio decrement 3
bind=ALT,period,spawn,dms ipc call audio increment 3

bind=NONE,XF86AudioRaiseVolume,spawn,dms ipc call audio increment 3
bind=NONE,XF86AudioLowerVolume,spawn,dms ipc call audio decrement 3

bind=NONE,XF86MonBrightnessUp,spawn,dms ipc call brightness increment 1
bind=NONE,XF86MonBrightnessDown,spawn,dms ipc call brightness decrement 1

# screenshot
bind=SUPER+ALT,s,spawn_shell,grim -g "$(slurp -b '#2E2A1E55' -c '#fb751bff')" -t ppm - | satty -f -

# lock
bind=SUPER+ALT,l,spawn,dms ipc call lock lock

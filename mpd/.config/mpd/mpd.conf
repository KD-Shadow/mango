music_directory        "/home/sh4dow/Music"
playlist_directory     "/home/sh4dow/.config/mpd/playlists"
db_file                "/home/sh4dow/.config/mpd/mpd.db"
state_file             "/home/sh4dow/.config/mpd/mpdstate"
auto_update            "yes"
bind_to_address        "/home/sh4dow/.config/mpd/socket"

# Enable curl input for streaming
input {
    plugin "curl"
}

# Enable yt-dlp playlist plugin
playlist_plugin {
    name "yt-dlp"
    enabled "yes"
}

audio_output {
    type            "pulse"
    name            "PulseAudio"
}

audio_output {
    type            "fifo"
    name            "Visualizer FIFO"
    path            "/tmp/mpd.fifo"
    format          "44100:16:2"
}

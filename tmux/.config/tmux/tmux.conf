# ============================================================================
# TMUX CONFIGURATION - Refined Minimal Edition
# ============================================================================

# ────────────────────────────────────────────────────────────────────────────
# Terminal & Display Settings
# ────────────────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -gq allow-passthrough on
set -g focus-events on
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
setw -g aggressive-resize on

# ────────────────────────────────────────────────────────────────────────────
# Window & Pane Numbering
# ────────────────────────────────────────────────────────────────────────────
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# ────────────────────────────────────────────────────────────────────────────
# Prefix Settings
# ────────────────────────────────────────────────────────────────────────────
set-option -g prefix C-b
set-option -g prefix2 none

# ────────────────────────────────────────────────────────────────────────────
# Core Utility Bindings
# ────────────────────────────────────────────────────────────────────────────
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "  Config reloaded"

unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

unbind c
bind c new-window -c "#{pane_current_path}"

unbind v
bind v copy-mode

# No-prefix navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -n S-Left previous-window
bind -n S-Right next-window

# Window swapping
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# ────────────────────────────────────────────────────────────────────────────
# Pane Resizing
# ────────────────────────────────────────────────────────────────────────────
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

# Quick resize
bind -r H resize-pane -L 10
bind -r J resize-pane -D 10
bind -r K resize-pane -U 10
bind -r L resize-pane -R 10

# ────────────────────────────────────────────────────────────────────────────
# Mouse Support
# ────────────────────────────────────────────────────────────────────────────
set -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# ────────────────────────────────────────────────────────────────────────────
# Copy Mode (Vim-style)
# ────────────────────────────────────────────────────────────────────────────
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle
bind-key -T copy-mode-vi 'Escape' send -X cancel

unbind -T copy-mode-vi MouseDragEnd1Pane
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -i -selection clipboard"

# ────────────────────────────────────────────────────────────────────────────
# Session & Popup Bindings
# ────────────────────────────────────────────────────────────────────────────
bind-key -r f run-shell "tmux neww ~/scripts/tmux-sessionizer"
bind-key n command-prompt "new-session -s '%%'"

bind-key C-y display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "yazi"
bind-key C-t display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "zsh"
bind-key C-g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"
bind-key C-m display-popup -w 95% -h 95% -E "rmpc"
bind-key C-h display-popup -d "#{pane_current_path}" -w 85% -h 85% -E "btop"

# Config menu
bind d display-menu -T "#[align=centre]Config" -x C -y C \
    ".zshrc"            z  "display-popup -w 75% -h 75% -E 'nvim ~/.zshrc'" \
    ".zprofile"         p  "display-popup -w 75% -h 75% -E 'nvim ~/.zprofile'" \
    ".tmux.conf"        t  "display-popup -w 75% -h 75% -E 'nvim ~/.tmux.conf'" \
    ".nvim"             v  "display-popup -d ~/dotfiles/nvim/.config/nvim -E 'nvim ~/dotfiles/nvim/.config/nvim'" \
    "quit"              q  ""

# Session menu
bind S display-menu -T "#[align=centre]Sessions" -x C -y C \
    "New Session"       n  "command-prompt -p 'New session name:' 'new-session -s %%'" \
    "Kill Session"      k  "confirm-before -p 'Kill current session? (y/n)' kill-session" \
    "Rename Session"    r  "command-prompt -I '#S' 'rename-session %%'" \
    "Switch Session"    s  "choose-tree -Zs" \
    "Detach"            d  "detach-client"

# Pane menu
bind P display-menu -T "#[align=centre]Panes" -x C -y C \
    "Split Horizontal"  h  "split-window -h -c '#{pane_current_path}'" \
    "Split Vertical"    v  "split-window -v -c '#{pane_current_path}'" \
    "Kill Pane"         k  "kill-pane" \
    "Break Pane"        b  "break-pane" \
    "Toggle Zoom"       z  "resize-pane -Z" \
    "Respawn Pane"      r  "respawn-pane -k"

# ────────────────────────────────────────────────────────────────────────────
# Plugin Configuration
# ────────────────────────────────────────────────────────────────────────────
set-environment -g TMUX_PLUGIN_MANAGER_PATH ~/.config/tmux/.tmux/plugins

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin "christoomey/vim-tmux-navigator"
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-continuum"
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-cpu'

# ────────────────────────────────────────────────────────────────────────────
# Plugin Settings
# ────────────────────────────────────────────────────────────────────────────
set -g @sessionx-bind 'o'
set -g @sessionx-window-height '90%'
set -g @sessionx-window-width '80%'
set -g @sessionx-preview-enabled 'true'

set -g @resurrect-capture-pane-contents "on"
set -g @continuum-restore "on"
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-save-interval '15'

set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_output_prefix ''
set -g @prefix_highlight_output_suffix ''
set -g @prefix_highlight_empty_prompt '    '
set -g @prefix_highlight_prefix_prompt 'PREFIX'
set -g @prefix_highlight_copy_prompt 'COPY'
set -g @prefix_highlight_empty_attr 'fg=#{@thm_overlay_0},bg=#{@thm_bg}'
set -g @prefix_highlight_fg '#{@thm_bg}'
set -g @prefix_highlight_bg '#{@thm_yellow}'
set -g @prefix_highlight_copy_mode_attr 'fg=#{@thm_bg},bg=#{@thm_peach}'

set -g @cpu_percentage_format "%3.0f%%"
set -g @ram_percentage_format "%3.0f%%"

# ────────────────────────────────────────────────────────────────────────────
# Catppuccin Theme
# ────────────────────────────────────────────────────────────────────────────
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

set -g @online_icon "on"
set -g @offline_icon "off"

# ────────────────────────────────────────────────────────────────────────────
# Status Bar - Minimal & Clean Design
# ────────────────────────────────────────────────────────────────────────────
set -g status-position bottom
set -g status-style "bg=#{@thm_bg}"
set -g status-justify "left"

# Left side - Session name and prefix indicator
set -g status-left-length 80
set -g status-left ""
set -ga status-left "#[fg=#{@thm_text},bg=#{@thm_bg}]#[fg=#{@thm_bg},bg=#{@thm_text},bold] #S #[fg=#{@thm_text},bg=#{@thm_bg}]"
set -ga status-left " #{prefix_highlight} "

# Right side - Compact info bar
set -g status-right-length 120
set -g status-right ""

# CPU indicator (compact)
set -ga status-right "#[fg=#{@thm_overlay_0}]"
set -ga status-right "#[fg=#{@thm_peach}] #{cpu_percentage}"

# RAM indicator
set -ga status-right "#[fg=#{@thm_overlay_0}] "
set -ga status-right "#[fg=#{@thm_teal}] #{ram_percentage}"

# Battery with color based on level
set -ga status-right "#[fg=#{@thm_overlay_0}] "
set -ga status-right "#{?#{e|<=:#{battery_percentage},20},#[fg=#{@thm_red}],#{?#{e|<=:#{battery_percentage},50},#[fg=#{@thm_yellow}],#[fg=#{@thm_green}]}}#{battery_icon} #{battery_percentage}"

# Network status
set -ga status-right "#[fg=#{@thm_overlay_0}] "
set -ga status-right "#{?#{==:#{online_status},on},#[fg=#{@thm_green}] #{online_status},#[fg=#{@thm_red}] #{online_status}}"

# Bold indicator if needed
set -ga status-right "#[fg=#{@thm_overlay_0}] "
set -ga status-right "#[fg=#{@thm_blue},bold]#{?#{e|==:1,#{window_zoomed_flag}}, ,}"

# Date & Time
set -ga status-right "#[fg=#{@thm_overlay_0}] "
set -ga status-right "#[fg=#{@thm_text},bg=#{@thm_bg}]#[fg=#{@thm_bg},bg=#{@thm_text},bold] %a %d %b  %H:%M #[fg=#{@thm_text},bg=#{@thm_bg}]"

# ────────────────────────────────────────────────────────────────────────────
# Window Status - Clean & Minimal
# ────────────────────────────────────────────────────────────────────────────
set -wg automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"
set -g monitor-activity on
set -g visual-activity off

# Inactive windows - subtle
set -g window-status-format "#[fg=#{@thm_surface_2}] #I:#W#{?window_flags,#{window_flags}, } "
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_surface_2}"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_overlay_1}"
set -g window-status-activity-style "bg=#{@thm_bg},fg=#{@thm_peach}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -g window-status-separator ""

# Active window - bold and clear
set -g window-status-current-format "#[fg=#{@thm_bg},bg=#{@thm_blue}]#[fg=#{@thm_bg},bg=#{@thm_blue},bold] #I:#W#{?window_flags,#{window_flags}, } #[fg=#{@thm_blue},bg=#{@thm_bg}]"
set -g window-status-current-style "bg=#{@thm_blue},fg=#{@thm_bg},bold"

# ────────────────────────────────────────────────────────────────────────────
# Pane Borders
# ────────────────────────────────────────────────────────────────────────────
setw -g pane-border-status off
setw -g pane-border-format ""
setw -g pane-active-border-style "fg=magenta"
setw -g pane-border-style "fg=blue"
setw -g pane-border-lines heavy

# ────────────────────────────────────────────────────────────────────────────
# Message & Command Styling
# ────────────────────────────────────────────────────────────────────────────
set -g message-style "bg=#{@thm_blue},fg=#{@thm_bg},bold"
set -g message-command-style "bg=#{@thm_yellow},fg=#{@thm_bg},bold"

# ────────────────────────────────────────────────────────────────────────────
# Clock Mode
# ────────────────────────────────────────────────────────────────────────────
# setw -g clock-mode-colour "#{@thm_blue}"
# setw -g clock-mode-style 24

# ────────────────────────────────────────────────────────────────────────────
# Initialize TPM
# ────────────────────────────────────────────────────────────────────────────
run '~/.config/tmux/.tmux/plugins/tpm/tpm'

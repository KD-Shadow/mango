# : Manager [[[

[mgr]
cwd = { fg = "#bcbcbc" }

# Find
find_keyword  = { fg = "#ff6357", bold = true, italic = true, underline = true }
find_position = { fg = "#ff6357", bold = true, italic = true }

# Marker
marker_copied   = { fg = "#848484", bg = "#848484" }
marker_cut      = { fg = "#515151", bg = "#515151" }
marker_marked   = { fg = "#ff6357", bg = "#ff6357" }
marker_selected = { fg = "#979797", bg = "#979797" }

# Count
count_copied   = { fg = "#e1e1e1", bg = "#515151" }
count_cut      = { fg = "#e1e1e1", bg = "#515151" }
count_selected = { fg = "#222222", bg = "#979797" }

# Border
border_symbol = "│"
border_style  = { fg = "#c6c6c6" }

# : ]]]


# : Indicator [[[

[indicator]
padding = { open = "█", close = "█" }

# : ]]]


# : Tabs [[[

[tabs]
active    = { fg = "#979797", bold = true, bg = "#131313" }
inactive  = { fg = "#979797", bg = "#131313" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Mode [[[

[mode]
# Mode
normal_main = { bg = "#979797", fg = "#222222", bold = true }
normal_alt  = { bg = "#474747", fg = "#979797" }

# Select mode
select_main = { bg = "#979797", fg = "#191919", bold = true }
select_alt  = { bg = "#474747", fg = "#979797" }

# Unset mode
unset_main = { bg = "#979797", fg = "#191919", bold = true }
unset_alt  = { bg = "#474747", fg = "#979797" }

# : ]]]


# : Status [[[

[status]
sep_left  = { open = "🭁", close = "🭠" }
sep_right = { open = "🭁", close = "🭠" }

# Permissions
perm_type  = { fg = "#4b4b4b" }
perm_write = { fg = "#4b4b4b" }
perm_read  = { fg = "#bd0d00" }
perm_exec  = { fg = "#9e9e9e" }
perm_sep   = { fg = "#9e9e9e" }

# Progress
progress_label  = { bold = true }
progress_normal = { fg = "#979797", bg = "#393939" }
progress_error  = { fg = "#ff6357", bg = "#393939" }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#393939" }
cand = { fg = "#979797" }
rest = { fg = "#222222" }
desc = { fg = "#bcbcbc" }
separator = " ▶ "
separator_style = { fg = "#bcbcbc" }

# : ]]]


# : Notify [[[

[notify]
title_info  = { fg = "#979797" }
title_warn  = { fg = "#979797" }
title_error = { fg = "#ff6357" }

# : ]]]


# : Picker [[[

[pick]
border = { fg = "#979797" }
active = { fg = "#979797", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#979797" }
value  = { fg = "#bcbcbc" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#979797", bg = "#222222" }

# : ]]]


# : Tasks [[[

[tasks]
border  = { fg = "#979797" }
title   = {}
hovered = { fg = "#515151", underline = true }

# : ]]]


# : Help [[[

[help]
on     = { fg = "#bcbcbc" }
run    = { fg = "#bcbcbc" }
footer = { fg = "#191919", bg = "#979797" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#7b0007" },
    { name = "*", is = "exec", fg = "#ffa69c" },

    # Fallback
    { url = "*", fg = "#bcbcbc" },
    { url = "*/", fg = "#c6c6c6" },
]

# : ]]]

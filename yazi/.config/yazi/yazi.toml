[plugin]
prepend_previewers = []
prepend_fetchers = [
  { id = "git", name = "*",  run = "git" },
  { id = "git", name = "*/", run = "git" },
]

[manager]
ratio          = [1, 3, 4]   # parent : current : preview column widths
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
show_hidden    = true
show_symlink   = true
linemode       = "size"      # show file sizes; options: none, size, mtime, permissions

[preview]
tab_size        = 2
max_width       = 1200
max_height      = 1200
cache_dir       = ""
image_filter    = "lanczos3"
image_quality   = 75
sixel_fraction  = 15
ueberzug_scale  = 1
ueberzug_offset = [0.0, 0.0, 0.0, 0.0]

[opener]
# define openers per filetype
edit = [
  { run = 'nvim "$@"', desc = "Neovim", block = true }
]
open = [
  { run = 'xdg-open "$@"', desc = "Open" }
]
play = [
  { run = 'mpv "$@"', desc = "mpv" }
]
extract = [
  { run = 'unar "$1"', desc = "Extract" }
]

[open]
# map mime types → opener
rules = [
  { mime = "text/*",             use = "edit"    },
  { mime = "image/*",            use = "open"    },
  { mime = "video/*",            use = "play"    },
  { mime = "audio/*",            use = "play"    },
  { mime = "application/zip",    use = "extract" },
  { mime = "application/pdf",    use = "open"    },
  { name = "*.toml",             use = "edit"    },
  { name = "*.yaml",             use = "edit"    },
  { name = "*.json",             use = "edit"    },
  { name = "*.rs",               use = "edit"    },
  { name = "*.py",               use = "edit"    },
]

[tasks]
micro_workers    = 10
macro_workers    = 4
bizarre_retry    = 5
image_alloc      = 536870912  # 512MB
image_bound      = [0, 0]
suppress_preload = false

[log]
enabled = false
